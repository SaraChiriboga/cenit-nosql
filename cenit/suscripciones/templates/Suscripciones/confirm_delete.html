{% extends "base.html" %}
{% block title %}Eliminar{% endblock %}

{% block breadcrumb %}
<a href="/" class="hover:text-primary transition-colors">Dashboard</a>
<span class="mx-2 text-on-surface-variant">/</span>
<span class="text-on-surface">Eliminar</span>
{% endblock %}

{% block content %}
<!-- El contenido de fondo queda oscurecido -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="glass-panel p-8 rounded-3xl w-full max-w-sm text-center border border-white/10 shadow-2xl">
        <span class="material-symbols-outlined text-5xl text-red-500 mb-4 block">delete_forever</span>

        <h2 class="text-xl font-bold text-white mb-2">¿Eliminar {{ tipo }}?</h2>
        <p class="text-white/60 mb-8 text-sm">
            Estás a punto de eliminar <strong class="text-white">{{ objeto }}</strong>.
            Esta acción no se puede deshacer.
        </p>

        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <a href="{% url cancel_url %}"
               class="flex-1 py-3 bg-white/5 hover:bg-white/10 text-white font-bold rounded-xl transition-all text-center">
                Cancelar
            </a>
            <button type="submit"
                    class="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all">
                Eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
